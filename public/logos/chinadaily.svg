    <text x="50%" y="408" text-anchor="middle" fill="#B9BEC7"
          font-family="'Archivo Black', 'Helvetica Neue', Arial, sans-serif"
          font-weight="900" font-size="148" letter-spacing="-2">DAILY</text>
  </g>
